{% extends "restaurants/base.html" %}
{% block title %}パスワード再設定 | NAGOYAMESHI{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h2 class="h4 mb-3">パスワード再設定</h2>
        <p class="text-secondary small">登録メールアドレス宛に再設定リンクを送信します。</p>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-dark w-100" type="submit">メールを送信</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

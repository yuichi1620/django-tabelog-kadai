{% extends "restaurants/base.html" %}
{% block title %}認証メール再送 | NAGOYAMESHI{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h2 class="h4 mb-3">認証メールを再送</h2>
          <p class="text-muted small">
            新規登録時に使ったメールアドレスを入力してください。該当する未認証アカウントがある場合に再送します。
          </p>

          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label" for="id_email">メールアドレス</label>
              <input
                class="form-control"
                type="email"
                name="email"
                id="id_email"
                value="{{ form.email.value|default:'' }}"
                required
              >
              {% if form.email.errors %}
                <div class="text-danger small mt-1">{{ form.email.errors }}</div>
              {% endif %}
            </div>
            <button type="submit" class="btn btn-dark w-100">認証メールを再送する</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

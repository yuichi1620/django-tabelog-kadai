{% extends "restaurants/base.html" %}
{% block title %}認証メール送信 | NAGOYAMESHI{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <h2 class="h4">認証メールを送信しました</h2>
    {% if email_change %}
      <p>{{ email }} 宛に認証メールを送信しました。メール内リンクからメールアドレス変更を完了してください。</p>
    {% else %}
      <p>{{ email }} 宛に認証メールを送信しました。メール内リンクから本登録を完了してください。</p>
    {% endif %}
  </div>
</div>
{% endblock %}

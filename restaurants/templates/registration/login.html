{% extends "restaurants/base.html" %}
{% block title %}ログイン | NAGOYAMESHI{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h2 class="h4 mb-3">ログイン</h2>

          {% if form.errors %}
            <div class="alert alert-danger">メールアドレスかパスワードが違います。</div>
          {% endif %}

          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label" for="id_username">メールアドレス</label>
              <input class="form-control" type="text" name="username" id="id_username" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="id_password">パスワード</label>
              <input class="form-control" type="password" name="password" id="id_password" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">ログイン</button>
          </form>
          <div class="mt-3 text-center">
            <a href="{% url 'password_reset' %}">パスワードをお忘れの方</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% extends "restaurants/base.html" %}
{% block title %}新しいパスワード設定 | NAGOYAMESHI{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h2 class="h4 mb-3">新しいパスワードを設定</h2>
        {% if validlink %}
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-dark w-100" type="submit">更新する</button>
          </form>
        {% else %}
          <div class="alert alert-danger mb-0">リンクが無効です。再度パスワード再設定を行ってください。</div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}

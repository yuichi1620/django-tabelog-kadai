{% extends "restaurants/base.html" %}
{% block title %}カード情報 | NAGOYAMESHI{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <h2 class="h4 mb-3">カード情報</h2>
    <p>カード情報の登録・変更・削除は Stripe のカスタマーポータルで行います。</p>

    {% if member.stripe_customer_id %}
    <form method="post" action="{% url 'restaurants:create_billing_portal_session' %}" class="d-flex gap-2">
      {% csrf_token %}
      <button class="btn btn-dark" type="submit">Stripeポータルを開く</button>
    </form>
    {% else %}
    <a class="btn btn-outline-dark" href="{% url 'restaurants:upgrade_membership' %}">先に有料会員登録へ</a>
    {% endif %}
  </div>
</div>
{% endblock %}

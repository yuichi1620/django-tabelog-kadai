{% extends "restaurants/base.html" %}
{% block title %}カテゴリ管理 | NAGOYAMESHI{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="h4 mb-0">カテゴリ一覧</h2>
  <a class="btn btn-outline-dark btn-sm" href="{% url 'restaurants:admin_dashboard' %}">管理ダッシュボードへ</a>
</div>

<form method="get" class="card border-0 shadow-sm mb-3">
  <div class="card-body row g-2 align-items-end">
    <div class="col-md-9">
      <label class="form-label">カテゴリ名で検索</label>
      <input class="form-control" type="text" name="q" value="{{ q }}">
    </div>
    <div class="col-md-3 d-grid">
      <button class="btn btn-dark" type="submit">検索</button>
    </div>
  </div>
</form>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <div class="mb-3">
      <a class="btn btn-dark btn-sm" href="{% url 'admin:restaurants_category_add' %}">カテゴリを新規登録</a>
    </div>
    <ul class="list-group list-group-flush">
      {% for c in categories %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ c.name }}</span>
        <a class="btn btn-outline-dark btn-sm" href="{% url 'admin:restaurants_category_change' c.id %}">編集 / 削除</a>
      </li>
      {% empty %}
      <li class="list-group-item text-secondary">カテゴリがありません。</li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock %}
